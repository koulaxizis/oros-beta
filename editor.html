<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>orOS Writer</title>
<link rel="stylesheet" href="assets/css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f172a"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>

<div id="oros-header"></div>

<!-- Quick Format Toolbar (above editor) -->
<div id="quick-format-toolbar" class="quick-format-toolbar">
<button class="fmt-btn fmt-bold" data-cmd="bold" data-i18n-tooltip="toolbar_bold" title="Bold">B</button>
<button class="fmt-btn fmt-italic" data-cmd="italic" data-i18n-tooltip="toolbar_italic" title="Italic">I</button>
<button class="fmt-btn fmt-underline" data-cmd="underline" data-i18n-tooltip="toolbar_underline" title="Underline">U</button>
<div class="fmt-divider"></div>
<button class="fmt-btn fmt-h1" data-block="H1" data-i18n-tooltip="toolbar_h1" title="Heading 1">#</button>
<button class="fmt-btn fmt-h2" data-block="H2" data-i18n-tooltip="toolbar_h2" title="Heading 2">##</button>
<button class="fmt-btn fmt-h3" data-block="H3" data-i18n-tooltip="toolbar_h3" title="Heading 3">###</button>
<div class="fmt-divider"></div>
<button class="fmt-btn fmt-list-ul" data-cmd="insertUnorderedList" data-i18n-tooltip="toolbar_bullet_list" title="Bullet List">•</button>
<button class="fmt-btn fmt-list-ol" data-cmd="insertOrderedList" data-i18n-tooltip="toolbar_number_list" title="Numbered List">1.</button>
</div>

<!-- Main Content Area -->
<main class="editor-wrapper">

<div id="rich-wrapper">
<div id="rich-editor" contenteditable="true" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="Rich text editor" tabindex="0" data-placeholder="Start writing..."></div>

<!-- Reading Progress Bar -->
<div id="reading-progress-bar" class="reading-progress"></div>

<!-- Goal Progress Bar -->
<div id="goal-bar" class="goal-bar" style="display:none;">
<select id="goal-unit">
<option value="words" data-i18n="goal_unit_words">Words</option>
<option value="chars" data-i18n="goal_unit_chars">Characters</option>
<option value="paras" data-i18n="goal_unit_paras">Paragraphs</option>
</select>
<input type="number" id="goal-target-input" min="1" placeholder="0" data-i18n-placeholder="goal_target_placeholder" aria-label="Target number"/>
<label class="goal-lock-label"><input type="checkbox" id="goal-lock"/><span data-i18n="goal_lock_label">Lock</span></label>
<button id="btn-set-goal" class="goal-action-btn" data-i18n-tooltip="btn_set_goal_tt" title="Set">✓</button>
<button id="btn-clear-goal" class="goal-action-btn" data-i18n-tooltip="btn_clear_goal_tt" title="Clear goal">🗑</button>
<button id="btn-close-goal" class="goal-action-btn" data-i18n-tooltip="btn_close_tt" title="Close">×</button>
</div>

<!-- Stats Overlay -->
<div id="stats-overlay" class="stats-overlay">
<span id="stats-default" class="stats-toggle">0 words · 0 chars ▾</span>
<span id="stats-goal" style="display:none;"></span>
<div id="stats-detailed" class="stats-detailed" style="display:none;">
<div class="stat-row"><span data-i18n="stats_chars_with_spaces">Chars w/spaces</span><span id="stat-chars-with-spaces">-</span></div>
<div class="stat-row"><span data-i18n="stats_chars_no_spaces">Chars no spaces</span><span id="stat-chars-no-spaces">-</span></div>
<div class="stat-row"><span data-i18n="stats_sentences">Sentences</span><span id="stat-sentences">-</span></div>
<div class="stat-row"><span data-i18n="stats_reading_time">Reading time</span><span id="stat-reading-time">-</span></div>
<div class="stat-row"><span data-i18n="stats_speaking_time">Speaking time</span><span id="stat-speaking-time">-</span></div>
</div>
</div>

<!-- Metadata Panel (Left Sidebar) -->
<div id="metadata-panel" class="side-panel left-panel" style="display:none;" role="complementary" aria-labelledby="meta-title-label">
<div class="panel-header">
<span data-i18n="meta_panel_title">Metadata</span>
<button id="btn-close-metadata" class="panel-close-btn" data-i18n-tooltip="btn_close_tt">×</button>
</div>
<div class="metadata-fields">
<div class="form-group">
<label id="meta-title-label" class="form-label" for="meta-title"><span data-i18n="meta_label_title">Title</span></label>
<input type="text" id="meta-title" class="form-control form-small" placeholder="Enter document title..." data-i18n-placeholder="meta_placeholder_title" aria-describedby="meta-title-label"/>
</div>
<div class="form-group">
<label class="form-label" for="meta-author"><span data-i18n="meta_label_author">Author</span></label>
<input type="text" id="meta-author" class="form-control form-small" placeholder="Your name..." data-i18n-placeholder="meta_placeholder_author" aria-label="Author"/>
</div>
<div class="form-group">
<label class="form-label" for="meta-tags"><span data-i18n="meta_label_tags">Tags</span></label>
<input type="text" id="meta-tags" class="form-control form-small" placeholder="tag1, tag2, tag3..." data-i18n-placeholder="meta_placeholder_tags" aria-label="Tags"/>
</div>
<div class="form-group">
<label class="form-label" for="meta-category"><span data-i18n="meta_label_category">Category</span></label>
<input type="text" id="meta-category" class="form-control form-small" placeholder="Blog post, Article, Story..." data-i18n-placeholder="meta_placeholder_category" aria-label="Category"/>
</div>
<div class="meta-info">
<p id="meta-created"></p>
<p id="meta-modified"></p>
</div>
</div>
</div>

<!-- Document Outline Panel (Right Sidebar) -->
<div id="outline-panel" class="side-panel right-panel" style="display:none;" role="complementary" aria-label="Document outline">
<div class="panel-header">
<span data-i18n="outline_title">Outline</span>
<button id="btn-close-outline" class="panel-close-btn" data-i18n-tooltip="btn_close_tt">×</button>
</div>
<div id="outline-list" class="outline-list"></div>
</div>

<!-- Word Frequency Panel (Right Sidebar) -->
<div id="wordfreq-panel" class="side-panel right-panel" style="display:none;" role="complementary" aria-label="Word frequency analysis">
<div class="panel-header">
<span data-i18n="word_freq_title">Word Frequency</span>
<button id="btn-close-wordfreq" class="panel-close-btn" data-i18n-tooltip="btn_close_tt">×</button>
</div>
<div id="wordfreq-summary" class="wordfreq-summary"></div>
<div id="wordfreq-list" class="wordfreq-list"></div>
</div>

</div><!-- /rich-wrapper -->

<!-- Find & Replace Bar -->
<div id="find-replace-bar" class="find-replace-bar" style="display:none;">
<div class="fr-column">
<input type="text" id="find-find" placeholder="Find..." data-i18n-placeholder="fr_find_placeholder" class="fr-input" aria-label="Find"/>
<div id="fr_results" class="fr-results"></div>
</div>
<div class="fr-separator">→</div>
<div class="fr-column">
<input type="text" id="find-replace" placeholder="Replace..." data-i18n-placeholder="fr_replace_placeholder" class="fr-input" aria-label="Replace"/>
<div class="fr-buttons">
<button id="btn-fr-replace" class="fr-button" data-i18n="fr_button_replace">Replace</button>
<button id="btn-fr-replace-all" class="fr-button fr-button-secondary" data-i18n="fr_button_replace_all">Replace All</button>
</div>
</div>
<button id="btn-close-fr" class="close-button" aria-label="Close find bar">✕</button>
</div>

</main>

<!-- Combined Bottom Toolbar -->
<div class="bottom-toolbar">
<div class="actions-container">
<div class="buttons-group">
<button id="btn-save" class="action-btn primary-btn" data-i18n-tooltip="tooltip_save">
<span class="icon">💾</span> <span data-i18n="action_save">Save</span>
</button>
<button id="btn-open" class="action-btn" data-i18n-tooltip="tooltip_open">
<span class="icon">📂</span> <span data-i18n="action_open">Open</span>
</button>
<input type="file" id="file-input" accept=".txt,.md,.markdown" style="display:none;" aria-hidden="true"/>
<button id="btn-clear" class="action-btn warning-btn" data-i18n-tooltip="tooltip_clear">
<span class="icon">🗑</span> <span data-i18n="action_clear">Clear</span>
</button>
<div class="dropdown-container">
<button id="btn-export" class="action-btn dropdown-trigger" data-i18n-tooltip="tooltip_export">
<span class="icon">📥</span> <span data-i18n="action_export">Export</span>
</button>
<div class="dropdown-menu" id="export-dropdown">
<button data-format="md" data-i18n="export_md">Markdown (.md)</button>
<button data-format="txt" data-i18n="export_txt">Plain Text (.txt)</button>
<button data-format="rtf" data-i18n="export_rtf">Rich Text (.rtf)</button>
<button data-format="doc" data-i18n="export_doc">Microsoft Word (.doc)</button>
<button data-format="pdf" data-i18n="export_pdf">PDF (.pdf)</button>
</div>
</div>
</div>
</div>
<div class="secondary-tools-group">
<button id="btn-goal" class="tool-btn" data-i18n-tooltip="tooltip_goal" title="Writing goal tracker">🎯</button>
<button id="btn-outline" class="tool-btn" data-i18n-tooltip="tooltip_outline" title="Document outline">📑</button>
<button id="btn-metadata" class="tool-btn" data-i18n-tooltip="tooltip_metadata" title="Document metadata">ℹ️</button>
<button id="btn-find" class="tool-btn" data-i18n-tooltip="tooltip_find" title="Find and replace">🔍</button>
<button id="btn-wordfreq" class="tool-btn" data-i18n-tooltip="word_freq_title" title="Word Frequency">📊</button>
</div>
</div>

<!-- Footer Component Mount Point -->
<footer id="oros-footer"></footer>

<script src="assets/js/components/header.js"></script>
<script src="assets/js/components/footer.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/editor.js"></script>

</body>
</html>
