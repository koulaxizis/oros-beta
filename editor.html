<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="orOS Writer — Privacy-first rich text editor. Works offline. No tracking.">
  <title>orOS Writer</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="canonical" href="https://koulaxizis.github.io/oros-beta/editor.html">

  <link rel="preload" href="assets/fonts/nunito-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/nunito-medium.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/nunito-semibold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/nunito-bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/nunito-extrabold.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="assets/css/icons.css">
  <link rel="stylesheet" href="assets/css/style.css">

  <link rel="manifest" href="manifest.json">

  <script src="assets/js/components/header.js" defer></script>
  <script src="assets/js/components/footer.js" defer></script>
  <script src="assets/js/editor.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</head>
<body>

  <div id="oros-header"></div>

  <div id="editor-wrapper">

    <div class="main-toolbar" id="main-toolbar">
      <div class="toolbar-group toolbar-left">
        <button class="action-btn" id="btn-save" data-i18n-tooltip="tooltip_save" title="Save (Ctrl+S)">
          <i class="fa fa-save"></i>
        </button>
        <button class="action-btn" id="btn-open" data-i18n-tooltip="tooltip_open" title="Open file">
          <i class="fa fa-folder-open"></i>
        </button>
        <input type="file" id="file-input" accept=".txt,.md,.markdown,.rtf" style="display:none;">
        <button class="action-btn" id="btn-clear" data-i18n-tooltip="tooltip_clear" title="Clear all content">
          <i class="fa fa-trash"></i>
        </button>
      </div>

      <div class="toolbar-group toolbar-center">
        <button class="fmt-text-btn" data-cmd="bold" data-i18n-tooltip="toolbar_bold" title="Bold">
          <i class="fa fa-bold"></i>
        </button>
        <button class="fmt-text-btn" data-cmd="italic" data-i18n-tooltip="toolbar_italic" title="Italic">
          <i class="fa fa-italic"></i>
        </button>
        <button class="fmt-text-btn" data-cmd="underline" data-i18n-tooltip="toolbar_underline" title="Underline">
          <i class="fa fa-underline"></i>
        </button>
        <span class="tb-separator"></span>
        <button class="fmt-text-btn" data-h="H1" data-block="h1" data-i18n-tooltip="toolbar_h1" title="Heading 1">H1</button>
        <button class="fmt-text-btn" data-h="H2" data-block="h2" data-i18n-tooltip="toolbar_h2" title="Heading 2">H2</button>
        <button class="fmt-text-btn" data-h="H3" data-block="h3" data-i18n-tooltip="toolbar_h3" title="Heading 3">H3</button>
      </div>

      <div class="toolbar-group toolbar-right">
        <button class="action-btn" id="btn-goal" data-i18n-tooltip="tooltip_goal" title="Writing goal tracker (Ctrl+G)">
          <i class="fa fa-bullseye"></i>
        </button>
        <button class="action-btn" id="btn-outline" data-i18n-tooltip="tooltip_outline" title="Document outline">
          <i class="fa fa-list-ul"></i>
        </button>
        <button class="action-btn" id="btn-metadata" data-i18n-tooltip="tooltip_metadata" title="Document metadata">
          <i class="fa fa-info-circle"></i>
        </button>
        <button class="action-btn" id="btn-find" data-i18n-tooltip="tooltip_find" title="Find and replace (Ctrl+F)">
          <i class="fa fa-search"></i>
        </button>
        <button class="action-btn" id="btn-wordfreq" data-i18n-tooltip="tooltip_find" title="Word frequency">
          <i class="fa fa-bar-chart"></i>
        </button>
        <button class="action-btn" id="btn-lorem" data-i18n-tooltip="tooltip_lorem_ipsum" title="Insert sample text">
          <i class="fa fa-pencil"></i>
        </button>
        <span class="tb-separator"></span>
        <div class="dropdown" id="export-dropdown-container">
          <button class="action-btn dropdown-toggle" id="btn-export" data-i18n-tooltip="tooltip_export" title="Export document">
            <i class="fa fa-download"></i>
            <i class="fa fa-caret-down dropdown-arrow-icon"></i>
          </button>
          <div class="dropdown-content" id="export-dropdown">
            <button data-format="md" data-i18n="export_md">Markdown (.md)</button>
            <button data-format="txt" data-i18n="export_txt">Plain Text (.txt)</button>
            <button data-format="rtf" data-i18n="export_rtf">Rich Text (.rtf)</button>
            <button data-format="doc" data-i18n="export_doc">Microsoft Word (.doc)</button>
            <button data-format="pdf" data-i18n="export_pdf">PDF (.pdf)</button>
          </div>
        </div>
      </div>
    </div>

    <div class="goal-bar" id="goal-bar" style="display:none;">
      <select id="goal-unit">
        <option value="words" data-i18n="goal_unit_words">Words</option>
        <option value="chars" data-i18n="goal_unit_chars">Characters</option>
        <option value="paras" data-i18n="goal_unit_paras">Paragraphs</option>
      </select>
      <input type="number" id="goal-target-input" placeholder="0" min="1" />
      <label class="goal-lock-label">
        <input type="checkbox" id="goal-lock">
        <span data-i18n="goal_lock_label">Lock</span>
      </label>
      <button class="mini-btn" id="btn-set-goal" data-i18n-tooltip="btn_set_goal_tt" title="Set goal">&#10003;</button>
      <button class="mini-btn" id="btn-clear-goal" data-i18n-tooltip="btn_clear_goal_tt" title="Clear goal">&#10005;</button>
      <button class="mini-btn" id="btn-close-goal" data-i18n-tooltip="btn_close_tt" title="Close">&#10005;</button>
    </div>

    <div class="find-replace-bar" id="find-replace-bar" style="display:none;">
      <input type="text" id="find-find" data-i18n-placeholder="fr_find_placeholder" placeholder="Find..." />
      <input type="text" id="find-replace" data-i18n-placeholder="fr_replace_placeholder" placeholder="Replace..." />
      <span id="fr_results" class="fr-results"></span>
      <button class="mini-btn" id="btn-fr-replace" data-i18n="fr_button_replace">Replace</button>
      <button class="mini-btn" id="btn-fr-replace-all" data-i18n="fr_button_replace_all">Replace All</button>
      <button class="mini-btn" id="btn-close-fr" data-i18n-tooltip="btn_close_tt" title="Close">&#10005;</button>
    </div>

    <div class="quick-format-toolbar" id="quick-format-toolbar">
      <button class="fmt-btn" data-cmd="bold" title="Bold"><i class="fa fa-bold"></i></button>
      <button class="fmt-btn" data-cmd="italic" title="Italic"><i class="fa fa-italic"></i></button>
      <button class="fmt-btn" data-cmd="underline" title="Underline"><i class="fa fa-underline"></i></button>
    </div>

    <div class="reading-progress-container">
      <div class="reading-progress-bar" id="reading-progress-bar" style="display:none;"></div>
    </div>

    <div class="rich-wrapper" id="rich-wrapper">
      <div
        class="rich-editor"
        id="rich-editor"
        contenteditable="true"
        spellcheck="true"
        data-i18n-placeholder="editor_placeholder"
        data-placeholder="Start writing..."
      ></div>

      <div class="save-indicator-overlay" id="save-indicator">&mdash;</div>

      <div class="stats-overlay" id="stats-overlay">
        <span class="stats-default" id="stats-default">0 words &middot; 0 chars &#9662;</span>
        <span class="stats-goal" id="stats-goal" style="display:none;"></span>
        <div class="stats-detailed" id="stats-detailed" style="display:none;"></div>
      </div>
    </div>

    <div class="side-panel outline-panel" id="outline-panel" style="display:none;">
      <div class="panel-header">
        <span class="panel-title" data-i18n="outline_title">Outline</span>
        <button class="mini-btn panel-close" id="btn-close-outline" data-i18n-tooltip="btn_close_tt" title="Close">&#10005;</button>
      </div>
      <div class="panel-body" id="outline-list"></div>
    </div>

    <div class="side-panel metadata-panel" id="metadata-panel" style="display:none;">
      <div class="panel-header">
        <span class="panel-title" data-i18n="meta_panel_title">Metadata</span>
        <button class="mini-btn panel-close" id="btn-close-metadata" data-i18n-tooltip="btn_close_tt" title="Close">&#10005;</button>
      </div>
      <div class="panel-body">
        <div class="meta-field">
          <label data-i18n="meta_label_title">Title</label>
          <input type="text" id="meta-title" data-i18n-placeholder="meta_placeholder_title" placeholder="Enter document title...">
        </div>
        <div class="meta-field">
          <label data-i18n="meta_label_author">Author</label>
          <input type="text" id="meta-author" data-i18n-placeholder="meta_placeholder_author" placeholder="Your name...">
        </div>
        <div class="meta-field">
          <label data-i18n="meta_label_category">Category</label>
          <input type="text" id="meta-category" data-i18n-placeholder="meta_placeholder_category" placeholder="Blog post, Article, Story...">
        </div>
        <div class="meta-field">
          <label data-i18n="meta_label_tags">Tags</label>
          <input type="text" id="meta-tags" data-i18n-placeholder="meta_placeholder_tags" placeholder="tag1, tag2, tag3...">
        </div>
        <div class="meta-dates">
          <div class="meta-date-row" id="meta-created" data-i18n-prefix="meta_label_created">Created: &mdash;</div>
          <div class="meta-date-row" id="meta-modified" data-i18n-prefix="meta_label_modified">Modified: &mdash;</div>
        </div>
      </div>
    </div>

    <div class="side-panel wordfreq-panel" id="wordfreq-panel" style="display:none;">
      <div class="panel-header">
        <span class="panel-title" data-i18n="word_freq_title">Word Frequency</span>
        <button class="mini-btn panel-close" id="btn-close-wordfreq" data-i18n-tooltip="btn_close_tt" title="Close">&#10005;</button>
      </div>
      <div class="panel-body">
        <div class="wordfreq-summary" id="wordfreq-summary"></div>
        <div class="wordfreq-list" id="wordfreq-list"></div>
      </div>
    </div>

  </div>

  <div id="oros-footer"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service-worker.js').catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>

</body>
</html>
