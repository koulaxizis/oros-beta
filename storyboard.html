<!-- storyboard.html — Νέο αρχείο στη ρίζα του repo -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="orOS Storyboard — Sketch frames and plan scenes. Privacy-first, works offline.">
  <title>orOS — Storyboard</title>
  <script src="config.js"></script>
  <script>
    document.write('<base href="' + (window.OROS_CONFIG ? window.OROS_CONFIG.baseHref : '/') + '">');
  </script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="assets/fonts/nunito-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/nunito-semibold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="assets/css/icons.css">
  <link rel="stylesheet" href="assets/style-storyboard.css">
  <script src="assets/js/components/header.js" defer></script>
  <script src="assets/js/components/footer.js" defer></script>
</head>
<body>
  <div id="oros-header"></div>

  <div class="tool-page">
    <div class="tool-page-container storyboard-page">

      <div class="tool-page-header">
        <h1 class="tool-page-title" data-i18n="storyboard_name">Storyboard</h1>
        <p class="tool-page-subtitle" data-i18n="storyboard_subtitle">Sketch frames and plan scenes</p>
      </div>

      <div class="storyboard-editor">

        <!-- TOP TOOLBAR -->
        <div class="sb-toolbar">
          <div class="sb-tools-left">
            <button id="sb-tool-brush" class="sb-tool-btn active" data-tool="brush" title="Brush">
              <i class="fa fa-pencil"></i>
            </button>
            <button id="sb-tool-eraser" class="sb-tool-btn" data-tool="eraser" title="Eraser">
              <i class="fa fa-eraser"></i>
            </button>
          </div>

          <div class="sb-tools-center">
            <div class="sb-size-control">
              <label class="sb-label" data-i18n="storyboard_size">Size</label>
              <input type="range" id="sb-brush-size" class="sb-brush-slider" min="1" max="50" value="5">
              <span id="sb-size-value" class="sb-size-display">5px</span>
            </div>

            <div class="sb-color-control">
              <label class="sb-label" data-i18n="storyboard_color">Color</label>
              <input type="color" id="sb-brush-color" class="sb-color-input" value="#e8e6e3">
            </div>
          </div>

          <div class="sb-tools-right">
            <button id="sb-clear-canvas" class="sb-action-btn" title="Clear Canvas">
              <i class="fa fa-trash"></i>
            </button>
            <button id="sb-add-frame" class="sb-action-btn sb-btn-primary" title="Add Frame">
              <i class="fa fa-plus"></i>
            </button>
            <button id="sb-delete-frame" class="sb-action-btn" title="Delete Current Frame">
              <i class="fa fa-minus"></i>
            </button>
            <button id="sb-export-png" class="sb-action-btn sb-btn-primary" title="Export All as ZIP">
              <i class="fa fa-download"></i>
            </button>
          </div>
        </div>

        <!-- CANVAS AREA -->
        <div class="sb-canvas-container">
          <canvas id="sb-canvas" width="800" height="450"></canvas>
          <div id="sb-canvas-overlay" class="sb-canvas-overlay"></div>
        </div>

        <!-- ANNOTATION INPUT -->
        <div class="sb-annotation-area">
          <textarea id="sb-annotation-input" class="sb-annotation-input" rows="2" data-i18n-placeholder="storyboard_annotation_placeholder" placeholder="Add notes for this frame..."></textarea>
        </div>

        <!-- FRAMES THUMBNAIL STRIP -->
        <div class="sb-frames-strip">
          <div id="sb-frames-container" class="sb-frames-container"></div>
        </div>

      </div>
    </div>
  </div>

  <div id="oros-footer"></div>

  <script src="assets/js/storyboard.js"></script>
</body>
</html>
