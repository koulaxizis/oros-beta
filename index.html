<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="orOS — The artist's operating system. Privacy-first creative toolkit. Works offline. No tracking.">
  <title>orOS — The Artist's Operating System</title>
  <script src="config.js"></script>
  <script>
    document.write('<base href="' + (window.OROS_CONFIG.baseHref || '/') + '">');
  </script>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="config.js"></script>
<script>
  document.write('<base href="' + (OROS_CONFIG.baseHref || '/') + '">');
  var cLink = document.createElement('link');
  cLink.rel = 'canonical';
  cLink.href = OROS_CONFIG.domain + window.location.pathname;
  document.head.appendChild(cLink);
</script>
  <link rel="manifest" href="manifest.json">

  <link rel="preload" href="assets/fonts/nunito-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/nunito-medium.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/nunito-semibold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/nunito-bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/nunito-extrabold.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="assets/css/icons.css">
  <link rel="stylesheet" href="assets/css/style.css">

  <script src="assets/js/components/header.js" defer></script>
  <script src="assets/js/components/footer.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</head>
<body>

  <div id="oros-header"></div>

  <section class="hero">
    <div class="container">
      <div class="hero-content">
        <img src="favicon.svg" alt="orOS" class="hero-logo">
        <h1>orOS</h1>
        <p data-i18n="site_tagline">The artist's operating system</p>
        <p data-i18n="tools_intro">Select a tool below. All applications work offline and respect your personal data.</p>
      </div>

      <div class="tools-grid">
        <a href="editor.html" class="tool-card">
          <div class="tool-icon">✍️</div>
          <h2 class="tool-name" data-i18n="editor_name">Writer</h2>
          <p class="tool-desc" data-i18n="editor_desc">Simple text editor with autosave</p>
        </a>
      </div>
    </div>
  </section>

  <div id="oros-footer"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service-worker.js').catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>

</body>
</html>
